settings:
  # Enabling of disabling whitelist: true, false.
  enable: true
  # Storage type: yml, mysql
  storage-type: yml

database: # If storage type is mysql
  host: "localhost:3306"
  name: "database"
  username: "root"
  password: "password"

messages:
  kick-message: "&cYou are not on the whitelist."
  no-permissions: "&2NBWL &7> &cYou don't have permission."
  player-add: "&2NBWL &7> &a%player% added to the whitelist."
  player-remove: "&2NBWL &7> &c%player% removed from the whitelist."
  player-already-exists: "&2NBWL &7> &c%player% already on the whitelist."
  player-not-found: "&2NBWL &7> &c%player% not found on the whitelist."
  plugin-reload: "&2NBWL &7> &aPlugin config reloaded."
  plugin-enable: "&2NBWL &7> &aName Based Whitelist enabled."
  plugin-disable: "&2NBWL &7> &cName Based Whitelist disabled."
  plugin-usage: "&2NBWL &7> &fPlugin usage:\n &7/nbwl reload &f- Config Reload.\n &7/nbwl add|remove <username> &f- add|remove player in whitelist.\n &7/nbwl enable|disable &f- Enable|Disable Name Based Whitelist."